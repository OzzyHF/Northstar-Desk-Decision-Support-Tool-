name: Dependency check (imports vs requirements)

on:
  pull_request:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  depcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-check-reqs

      - name: Fail if imports are missing from requirements
        run: |
          # Adjust paths to your repo layout
          # Common: src/ and tests/
          pip-missing-reqs src tests --requirements-file=requirements.txt --ignore-file=.gitignore

      - name: Fail if requirements has unused packages
        run: |
          pip-extra-reqs src tests --requirements-file=requirements.txt --ignore-file=.gitignore